<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Performance — Weekly Summary</title>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-theme-quartz.css">
  <script src="https://unpkg.com/papaparse@5.5.2/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #fff;
      padding: 32px 48px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
    .subtitle { color: #6b7280; font-size: 0.88rem; margin-bottom: 20px; }

    nav { display: flex; gap: 6px; margin-bottom: 24px; }
    nav a {
      padding: 7px 18px; border-radius: 6px; text-decoration: none;
      font-size: 0.84rem; font-weight: 600;
      border: 1px solid #e5e7eb; color: #6b7280; background: #fff;
    }
    nav a:hover { border-color: #4f46e5; color: #4f46e5; }
    nav a.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    .filters { display: flex; gap: 14px; align-items: flex-end; margin-bottom: 18px; flex-wrap: wrap; }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; color: #9ca3af; font-weight: 600; }
    .fg select {
      border: 1px solid #e5e7eb; background: #fff; color: #1a1a2e;
      padding: 7px 12px; border-radius: 6px; font-size: 0.84rem; min-width: 140px;
    }
    .fg select:focus { outline: none; border-color: #4f46e5; }

    #loading { text-align: center; padding: 80px 0; color: #9ca3af; }

    .ag-theme-quartz {
      --ag-border-radius: 8px;
      --ag-font-size: 12px;
    }

    .row-value { font-weight: 600; }
    .row-group-first td, .row-group-first .ag-cell { border-top: 2px solid #e5e7eb !important; }
    .metric-label { color: #6b7280; font-size: 0.78rem; }
    .pct-up { color: #16a34a !important; }
    .pct-down { color: #dc2626 !important; }
    .pct-flat { color: #9ca3af !important; }
  </style>
</head>
<body>

  <h1>Marketing Performance — Weekly Pivot</h1>
  <p class="subtitle">Rows: BU &times; Acq Type &times; Metric &nbsp;|&nbsp; Columns: Weeks (newest first)</p>

  <nav>
    <a href="index.html">Forecast Raw</a>
    <a href="summary.html" class="active">Forecast Pivot</a>
    <a href="attribution.html">Attribution Data</a>
  </nav>

  <div class="filters" id="filters" style="display:none">
    <div class="fg">
      <label>BU</label>
      <select id="f-bu"><option value="">All</option></select>
    </div>
    <div class="fg">
      <label>Acquisition Type</label>
      <select id="f-acq"><option value="">All</option></select>
    </div>
    <div class="fg">
      <label>Weeks to show</label>
      <select id="f-weeks">
        <option value="8">8 weeks</option>
        <option value="12">12 weeks</option>
        <option value="16" selected>16 weeks</option>
        <option value="26">26 weeks</option>
        <option value="52">52 weeks</option>
      </select>
    </div>
  </div>

  <div id="loading">Loading & pivoting…</div>
  <div id="grid" class="ag-theme-quartz" style="height:calc(100vh - 250px);display:none"></div>

  <script>
    function weekOf(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr + "T00:00:00");
      const day = d.getDay();
      d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
      return d.toISOString().slice(0, 10);
    }

    function addWeeks(w, n) {
      const d = new Date(w + "T00:00:00");
      d.setDate(d.getDate() + n * 7);
      return d.toISOString().slice(0, 10);
    }

    const METRICS = ["Spend", "Activations", "CAC"];
    const ROW_TYPES = ["Value", "Plan", "vs Plan", "Wo4W", "YoY"];
    const ROWS_PER_GROUP = METRICS.length * ROW_TYPES.length;

    let gridApi = null;
    let allAgg = {};
    let allLookup = {};
    let allBus = [];
    let allAcqs = [];

    function buildRows(buFilter, acqFilter, numWeeks) {
      const today = new Date().toISOString().slice(0, 10);
      const currentWeek = weekOf(today);

      const allWeeks = [...new Set(Object.values(allAgg).map(g => g.week))]
        .filter(w => w <= currentWeek)
        .sort((a, b) => b.localeCompare(a))
        .slice(0, numWeeks);

      const groups = new Map();
      for (const g of Object.values(allAgg)) {
        if (buFilter && g.bu !== buFilter) continue;
        if (acqFilter && g.acq !== acqFilter) continue;
        const gk = `${g.bu}||${g.acq}`;
        if (!groups.has(gk)) groups.set(gk, { bu: g.bu, acq: g.acq });
      }

      const sortedGroups = [...groups.values()].sort((a, b) =>
        a.bu.localeCompare(b.bu) || a.acq.localeCompare(b.acq)
      );

      const rows = [];
      let rowIdx = 0;
      for (const grp of sortedGroups) {
        for (const metric of METRICS) {
          for (const rt of ROW_TYPES) {
            const row = {
              bu: grp.bu,
              acq: grp.acq,
              metric,
              rowType: rt,
              _groupKey: `${grp.bu}||${grp.acq}`,
              _isGroupFirst: metric === "Spend" && rt === "Value",
              _isValue: rt === "Value",
              _isPlan: rt === "Plan",
              _metric: metric,
              _rowIdx: rowIdx++,
            };

            for (const week of allWeeks) {
              const d = allLookup[`${grp.bu}||${grp.acq}||${week}`];
              if (!d) { row[week] = null; continue; }

              const spend = d.spend;
              const act = d.act;
              const cac = act > 0 ? spend / act : null;
              const planSpend = d.plan_spend;
              const planAct = d.plan_act;
              const planCac = planAct > 0 ? planSpend / planAct : null;

              const w4 = allLookup[`${grp.bu}||${grp.acq}||${addWeeks(week, -4)}`];
              const yy = allLookup[`${grp.bu}||${grp.acq}||${addWeeks(week, -52)}`];

              if (metric === "Spend") {
                if (rt === "Value") row[week] = spend;
                else if (rt === "Plan") row[week] = planSpend > 0 ? planSpend : null;
                else if (rt === "vs Plan") row[week] = planSpend > 0 ? (spend - planSpend) / planSpend : null;
                else if (rt === "Wo4W") row[week] = w4?.spend > 0 ? (spend - w4.spend) / w4.spend : null;
                else if (rt === "YoY") row[week] = yy?.spend > 0 ? (spend - yy.spend) / yy.spend : null;
              } else if (metric === "Activations") {
                if (rt === "Value") row[week] = act;
                else if (rt === "Plan") row[week] = planAct > 0 ? planAct : null;
                else if (rt === "vs Plan") row[week] = planAct > 0 ? (act - planAct) / planAct : null;
                else if (rt === "Wo4W") row[week] = w4?.act > 0 ? (act - w4.act) / w4.act : null;
                else if (rt === "YoY") row[week] = yy?.act > 0 ? (act - yy.act) / yy.act : null;
              } else if (metric === "CAC") {
                const w4Cac = w4?.act > 0 ? w4.spend / w4.act : null;
                const yyCac = yy?.act > 0 ? yy.spend / yy.act : null;
                if (rt === "Value") row[week] = cac;
                else if (rt === "Plan") row[week] = planCac > 0 ? planCac : null;
                else if (rt === "vs Plan") row[week] = planCac > 0 && cac != null ? (cac - planCac) / planCac : null;
                else if (rt === "Wo4W") row[week] = w4Cac > 0 && cac != null ? (cac - w4Cac) / w4Cac : null;
                else if (rt === "YoY") row[week] = yyCac > 0 && cac != null ? (cac - yyCac) / yyCac : null;
              }
            }
            rows.push(row);
          }
        }
      }

      return { rows, weeks: allWeeks };
    }

    function weekColFormatter(params) {
      const v = params.value;
      if (v == null || isNaN(v)) return "";

      const rt = params.data.rowType;
      const metric = params.data._metric;

      if (rt === "Value" || rt === "Plan") {
        if (metric === "Spend") return "$" + Math.round(v).toLocaleString();
        if (metric === "Activations") return Math.round(v).toLocaleString();
        if (metric === "CAC") return v > 0 ? "$" + v.toFixed(2) : "";
      }

      return (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
    }

    function weekColCellClass(params) {
      const v = params.value;
      const rt = params.data.rowType;
      const metric = params.data._metric;

      if (rt === "Value") return "row-value";
      if (rt === "Plan") return "";
      if (v == null || isNaN(v)) return "pct-flat";

      const invertColor = metric === "Spend" || metric === "CAC";
      const isPositive = invertColor ? v < -0.005 : v > 0.005;
      const isNegative = invertColor ? v > 0.005 : v < -0.005;
      if (isPositive) return "pct-up";
      if (isNegative) return "pct-down";
      return "pct-flat";
    }

    function renderGrid(buFilter, acqFilter, numWeeks) {
      const { rows, weeks } = buildRows(buFilter, acqFilter, numWeeks);

      const weekCols = weeks.map(w => ({
        headerName: w,
        field: w,
        width: 108,
        type: "numericColumn",
        valueFormatter: weekColFormatter,
        cellClass: weekColCellClass,
        suppressMenu: true,
      }));

      const columnDefs = [
        { headerName: "BU", field: "bu", pinned: "left", width: 100, rowSpan: params => {
            if (params.data._isGroupFirst) return ROWS_PER_GROUP;
            return 1;
          },
          cellClassRules: { "row-value": p => p.data._isGroupFirst },
          cellStyle: params => params.data._isGroupFirst ? { fontWeight: 600 } : { color: "transparent" },
        },
        { headerName: "Acq Type", field: "acq", pinned: "left", width: 100,
          rowSpan: params => params.data._isGroupFirst ? ROWS_PER_GROUP : 1,
          cellStyle: params => params.data._isGroupFirst ? { fontWeight: 600 } : { color: "transparent" },
        },
        { headerName: "Metric", field: "metric", pinned: "left", width: 100,
          cellStyle: params => params.data.rowType === "Value" ? { fontWeight: 600 } : { color: "#6b7280", fontSize: "0.82rem" },
        },
        { headerName: "", field: "rowType", pinned: "left", width: 70,
          cellStyle: params => {
            if (params.data.rowType === "Value") return { fontWeight: 600 };
            if (params.data.rowType === "Plan") return { color: "#6b7280", fontSize: "0.82rem" };
            return { color: "#9ca3af", fontSize: "0.78rem", fontStyle: "italic" };
          },
        },
        ...weekCols,
      ];

      if (gridApi) gridApi.destroy();

      const gridEl = document.getElementById("grid");
      gridApi = agGrid.createGrid(gridEl, {
        rowData: rows,
        columnDefs,
        defaultColDef: { sortable: false, resizable: true },
        suppressRowTransform: true,
        animateRows: false,
        headerHeight: 36,
        rowHeight: 30,
        getRowStyle: params => {
          const d = params.data;
          const shade = d._rowIdx % 2 === 0 ? "#ffffff" : "#f8f9fb";
          const style = { background: shade };
          if (d._isGroupFirst) style.borderTop = "2px solid #d1d5db";
          else if (d.rowType === "Value" && d.metric !== "Spend") style.borderTop = "1px solid #e5e7eb";
          return style;
        },
      });
    }

    Papa.parse("forecast_performance.csv", {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete(results) {
        for (const r of results.data) {
          const week = weekOf(r.date_et);
          if (!week) continue;
          const key = `${r.BU || ""}||${r.acquisition_type || ""}||${week}`;
          if (!allAgg[key]) allAgg[key] = { bu: r.BU || "", acq: r.acquisition_type || "", week, spend: 0, act: 0, plan_spend: 0, plan_act: 0 };
          allAgg[key].spend += (r.spend_usd_amt || 0);
          allAgg[key].act += (r.first_cashouts_y1_cnt || 0);
          allAgg[key].plan_spend += (r.planned_spend_usd_amt || 0);
          allAgg[key].plan_act += (r.planned_first_cashouts_y1_cnt || 0);
        }

        for (const g of Object.values(allAgg)) allLookup[`${g.bu}||${g.acq}||${g.week}`] = g;

        allBus = [...new Set(Object.values(allAgg).map(g => g.bu))].filter(Boolean).sort();
        allAcqs = [...new Set(Object.values(allAgg).map(g => g.acq))].filter(Boolean).sort();

        const fBu = document.getElementById("f-bu");
        const fAcq = document.getElementById("f-acq");
        allBus.forEach(v => fBu.append(new Option(v, v)));
        allAcqs.forEach(v => fAcq.append(new Option(v, v)));

        document.getElementById("loading").style.display = "none";
        document.getElementById("grid").style.display = "block";
        document.getElementById("filters").style.display = "flex";

        function refresh() {
          renderGrid(fBu.value, fAcq.value, +document.getElementById("f-weeks").value);
        }

        fBu.addEventListener("change", refresh);
        fAcq.addEventListener("change", refresh);
        document.getElementById("f-weeks").addEventListener("change", refresh);

        refresh();
      }
    });
  </script>
</body>
</html>
