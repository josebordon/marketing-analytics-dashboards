<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Performance — Weekly Summary</title>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-theme-quartz.css">
  <script src="https://unpkg.com/papaparse@5.5.2/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #f8f9fb;
      padding: 32px 48px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }

    .subtitle { color: #6b7280; font-size: 0.88rem; margin-bottom: 20px; }

    nav { display: flex; gap: 6px; margin-bottom: 24px; }

    nav a {
      padding: 7px 18px; border-radius: 6px; text-decoration: none;
      font-size: 0.84rem; font-weight: 600;
      border: 1px solid #e5e7eb; color: #6b7280; background: #fff;
      transition: all 0.15s;
    }

    nav a:hover { border-color: #4f46e5; color: #4f46e5; }
    nav a.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    .filters {
      display: flex; gap: 14px; align-items: flex-end;
      margin-bottom: 18px; flex-wrap: wrap;
    }

    .fg { display: flex; flex-direction: column; gap: 3px; }

    .fg label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em;
      color: #9ca3af; font-weight: 600;
    }

    .fg select, .fg input[type="date"] {
      border: 1px solid #e5e7eb; background: #fff; color: #1a1a2e;
      padding: 7px 12px; border-radius: 6px; font-size: 0.84rem; min-width: 140px;
    }

    .fg select:focus, .fg input:focus { outline: none; border-color: #4f46e5; }

    .status-bar {
      display: flex; gap: 20px; align-items: center;
      margin-bottom: 14px; font-size: 0.84rem; color: #6b7280;
    }

    .status-bar .ct { color: #4f46e5; font-weight: 600; }

    #loading { text-align: center; padding: 80px 0; color: #9ca3af; font-size: 1rem; }

    .ag-theme-quartz { --ag-border-radius: 8px; }

    .pct-up { color: #16a34a !important; font-weight: 600; }
    .pct-down { color: #dc2626 !important; font-weight: 600; }
    .pct-flat { color: #9ca3af !important; }
  </style>
</head>
<body>

  <h1>Marketing Performance — Weekly Summary</h1>
  <p class="subtitle">Grouped by BU &times; Acquisition Type &times; Week with WoW, YoY, and vs Plan</p>

  <nav>
    <a href="index.html">Raw Data</a>
    <a href="summary.html" class="active">Weekly Summary</a>
  </nav>

  <div class="filters" id="filters" style="display:none">
    <div class="fg">
      <label>BU</label>
      <select id="f-bu"><option value="">All</option></select>
    </div>
    <div class="fg">
      <label>Acquisition Type</label>
      <select id="f-acq"><option value="">All</option></select>
    </div>
    <div class="fg">
      <label>From</label>
      <input type="date" id="f-from">
    </div>
    <div class="fg">
      <label>To</label>
      <input type="date" id="f-to">
    </div>
  </div>

  <div class="status-bar" id="status" style="display:none">
    <span><span class="ct" id="n-rows">0</span> weekly groups</span>
  </div>

  <div id="loading">Loading & aggregating…</div>
  <div id="grid" class="ag-theme-quartz" style="height:calc(100vh - 290px);display:none"></div>

  <script>
    function weekOf(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr + "T00:00:00");
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff)).toISOString().slice(0, 10);
    }

    function addWeeks(w, n) {
      const d = new Date(w + "T00:00:00");
      d.setDate(d.getDate() + n * 7);
      return d.toISOString().slice(0, 10);
    }

    function pctCell(params, invert) {
      const v = params.value;
      if (v == null || isNaN(v)) return "—";
      const s = (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
      const el = params.eGridCell;
      el.classList.remove("pct-up", "pct-down", "pct-flat");
      const positive = invert ? v < -0.005 : v > 0.005;
      const negative = invert ? v > 0.005 : v < -0.005;
      if (positive) el.classList.add("pct-up");
      else if (negative) el.classList.add("pct-down");
      else el.classList.add("pct-flat");
      return s;
    }

    const dollarFmt = p => {
      const v = p.value;
      return v != null && !isNaN(v) ? "$" + Math.round(v).toLocaleString() : "—";
    };

    const numFmt = p => {
      const v = p.value;
      return v != null && !isNaN(v) ? Math.round(v).toLocaleString() : "—";
    };

    const cacFmt = p => {
      const v = p.value;
      return v != null && !isNaN(v) ? "$" + v.toFixed(2) : "—";
    };

    Papa.parse("forecast_performance.csv", {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete(results) {
        const raw = results.data;

        const agg = {};
        for (const r of raw) {
          const week = weekOf(r.date_et);
          if (!week) continue;
          const key = `${r.BU || ""}||${r.acquisition_type || ""}||${week}`;
          if (!agg[key]) agg[key] = { bu: r.BU || "", acq: r.acquisition_type || "", week, spend: 0, act: 0, plan_spend: 0, plan_act: 0 };
          agg[key].spend += (r.spend_usd_amt || 0);
          agg[key].act += (r.first_cashouts_y1_cnt || 0);
          agg[key].plan_spend += (r.planned_spend_usd_amt || 0);
          agg[key].plan_act += (r.planned_first_cashouts_y1_cnt || 0);
        }

        const grouped = Object.values(agg);
        const lk = {};
        for (const g of grouped) lk[`${g.bu}||${g.acq}||${g.week}`] = g;

        const rows = grouped.map(g => {
          const pw = lk[`${g.bu}||${g.acq}||${addWeeks(g.week, -1)}`];
          const yy = lk[`${g.bu}||${g.acq}||${addWeeks(g.week, -52)}`];
          return {
            ...g,
            cac: g.act > 0 ? g.spend / g.act : null,
            spend_wow: pw?.spend > 0 ? (g.spend - pw.spend) / pw.spend : null,
            spend_yoy: yy?.spend > 0 ? (g.spend - yy.spend) / yy.spend : null,
            spend_vs_plan: g.plan_spend > 0 ? (g.spend - g.plan_spend) / g.plan_spend : null,
            act_wow: pw?.act > 0 ? (g.act - pw.act) / pw.act : null,
            act_yoy: yy?.act > 0 ? (g.act - yy.act) / yy.act : null,
            act_vs_plan: g.plan_act > 0 ? (g.act - g.plan_act) / g.plan_act : null,
          };
        });

        // Populate filters
        const bus = [...new Set(rows.map(r => r.bu))].filter(Boolean).sort();
        const acqs = [...new Set(rows.map(r => r.acq))].filter(Boolean).sort();
        const fBu = document.getElementById("f-bu");
        const fAcq = document.getElementById("f-acq");
        bus.forEach(v => fBu.append(new Option(v, v)));
        acqs.forEach(v => fAcq.append(new Option(v, v)));

        const weeks = rows.map(r => r.week).sort();
        document.getElementById("f-from").value = weeks[Math.max(0, weeks.length - 52)] || weeks[0];
        document.getElementById("f-to").value = weeks.at(-1);

        document.getElementById("loading").style.display = "none";
        document.getElementById("grid").style.display = "block";
        document.getElementById("filters").style.display = "flex";
        document.getElementById("status").style.display = "flex";

        const gridApi = agGrid.createGrid(document.getElementById("grid"), {
          rowData: rows,
          defaultColDef: { sortable: true, resizable: true, minWidth: 80 },
          columnDefs: [
            { headerName: "Week", field: "week", pinned: "left", width: 110, sort: "desc" },
            { headerName: "BU", field: "bu", pinned: "left", width: 100 },
            { headerName: "Acq Type", field: "acq", pinned: "left", width: 105 },
            {
              headerName: "Spend",
              children: [
                { headerName: "Amount", field: "spend", valueFormatter: dollarFmt, type: "numericColumn", width: 120 },
                { headerName: "WoW", field: "spend_wow", valueFormatter: p => pctCell(p, true), type: "numericColumn", width: 85 },
                { headerName: "YoY", field: "spend_yoy", valueFormatter: p => pctCell(p, true), type: "numericColumn", width: 85 },
                { headerName: "vs Plan", field: "spend_vs_plan", valueFormatter: p => pctCell(p, true), type: "numericColumn", width: 90 },
              ]
            },
            {
              headerName: "Activations (Y1)",
              children: [
                { headerName: "Count", field: "act", valueFormatter: numFmt, type: "numericColumn", width: 110 },
                { headerName: "WoW", field: "act_wow", valueFormatter: p => pctCell(p, false), type: "numericColumn", width: 85 },
                { headerName: "YoY", field: "act_yoy", valueFormatter: p => pctCell(p, false), type: "numericColumn", width: 85 },
                { headerName: "vs Plan", field: "act_vs_plan", valueFormatter: p => pctCell(p, false), type: "numericColumn", width: 90 },
              ]
            },
            { headerName: "CAC", field: "cac", valueFormatter: cacFmt, type: "numericColumn", width: 90 },
            { headerName: "Plan Spend", field: "plan_spend", valueFormatter: dollarFmt, type: "numericColumn", width: 115 },
            { headerName: "Plan Acts", field: "plan_act", valueFormatter: numFmt, type: "numericColumn", width: 105 },
          ],
          pagination: true,
          paginationPageSize: 50,
          paginationPageSizeSelector: [25, 50, 100, 250],
          animateRows: false,
        });

        document.getElementById("n-rows").textContent = rows.length.toLocaleString();

        function applyFilters() {
          const bu = fBu.value;
          const acq = fAcq.value;
          const from = document.getElementById("f-from").value;
          const to = document.getElementById("f-to").value;

          gridApi.setGridOption("isExternalFilterPresent", () => true);
          gridApi.setGridOption("doesExternalFilterPass", node => {
            const d = node.data;
            if (bu && d.bu !== bu) return false;
            if (acq && d.acq !== acq) return false;
            if (from && d.week < from) return false;
            if (to && d.week > to) return false;
            return true;
          });
          gridApi.onFilterChanged();
        }

        fBu.addEventListener("change", applyFilters);
        fAcq.addEventListener("change", applyFilters);
        document.getElementById("f-from").addEventListener("change", applyFilters);
        document.getElementById("f-to").addEventListener("change", applyFilters);

        applyFilters();
      }
    });
  </script>
</body>
</html>
