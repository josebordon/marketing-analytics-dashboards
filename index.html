<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Performance — Raw Data</title>

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-theme-quartz.css">
  <script src="https://unpkg.com/papaparse@5.5.2/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #f8f9fb;
      padding: 32px 48px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }

    .subtitle { color: #6b7280; font-size: 0.88rem; margin-bottom: 20px; }
    .subtitle code { color: #4f46e5; background: #eef2ff; padding: 2px 6px; border-radius: 4px; font-size: 0.82em; }

    nav { display: flex; gap: 6px; margin-bottom: 24px; }

    nav a {
      padding: 7px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
      border: 1px solid #e5e7eb;
      color: #6b7280;
      background: #fff;
      transition: all 0.15s;
    }

    nav a:hover { border-color: #4f46e5; color: #4f46e5; }
    nav a.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    .status-bar {
      display: flex; gap: 20px; align-items: center;
      margin-bottom: 14px; font-size: 0.84rem; color: #6b7280;
    }

    .status-bar .ct { color: #4f46e5; font-weight: 600; }

    #loading { text-align: center; padding: 80px 0; color: #9ca3af; font-size: 1rem; }

    .ag-theme-quartz { --ag-border-radius: 8px; }
  </style>
</head>
<body>

  <h1>Marketing Performance</h1>
  <p class="subtitle">Raw data from <code>rpt_marketing_performance_to_forecast_daily</code></p>

  <nav>
    <a href="index.html" class="active">Raw Data</a>
    <a href="summary.html">Weekly Summary</a>
  </nav>

  <div class="status-bar" id="status" style="display:none">
    <span><span class="ct" id="n-rows">0</span> rows</span>
    <span>Date range: <span class="ct" id="dt-range"></span></span>
  </div>

  <div id="loading">Loading data…</div>
  <div id="grid" class="ag-theme-quartz" style="height:calc(100vh - 210px);display:none"></div>

  <script>
    function dollarFmt(p) {
      const v = p.value;
      if (v == null || v === "" || isNaN(v)) return "—";
      return "$" + Math.round(Number(v)).toLocaleString();
    }

    function numFmt(p) {
      const v = p.value;
      if (v == null || v === "" || isNaN(v)) return "—";
      return Number(v).toLocaleString(undefined, { maximumFractionDigits: 1 });
    }

    Papa.parse("forecast_performance.csv", {
      download: true,
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true,
      complete(results) {
        const data = results.data;
        document.getElementById("loading").style.display = "none";
        document.getElementById("grid").style.display = "block";
        document.getElementById("status").style.display = "flex";
        document.getElementById("n-rows").textContent = data.length.toLocaleString();

        const dates = data.map(d => d.date_et).filter(Boolean).sort();
        document.getElementById("dt-range").textContent = dates[0] + " → " + dates.at(-1);

        agGrid.createGrid(document.getElementById("grid"), {
          rowData: data,
          defaultColDef: {
            sortable: true, filter: true, resizable: true,
            floatingFilter: true, minWidth: 90,
          },
          columnDefs: [
            { headerName: "Date", field: "date_et", pinned: "left", width: 120, filter: "agDateColumnFilter" },
            { headerName: "BU", field: "BU", pinned: "left", width: 100 },
            { headerName: "Acq Type", field: "acquisition_type", width: 110 },
            { headerName: "Segment", field: "finance_segment_id", width: 100 },
            { headerName: "Product", field: "finance_product_name", width: 150 },
            { headerName: "Installs", field: "installs_cnt", valueFormatter: numFmt, type: "numericColumn", width: 110 },
            { headerName: "Sign-Ups", field: "sign_ups_cnt", valueFormatter: numFmt, type: "numericColumn", width: 110 },
            { headerName: "Activations (Y1)", field: "first_cashouts_y1_cnt", valueFormatter: numFmt, type: "numericColumn", width: 140 },
            { headerName: "Mature Acts (Y1)", field: "first_cashouts_mature_y1_cnt", valueFormatter: numFmt, type: "numericColumn", width: 145 },
            { headerName: "Acts In-Month", field: "first_cashouts_in_month_cnt", valueFormatter: numFmt, type: "numericColumn", width: 130 },
            { headerName: "Spend", field: "spend_usd_amt", valueFormatter: dollarFmt, type: "numericColumn", width: 120 },
            { headerName: "Est. Revenue", field: "estimated_future_revenue_amt", valueFormatter: dollarFmt, type: "numericColumn", width: 130 },
            { headerName: "Plan Spend", field: "planned_spend_usd_amt", valueFormatter: dollarFmt, type: "numericColumn", width: 120 },
            { headerName: "Plan Acts (Y1)", field: "planned_first_cashouts_y1_cnt", valueFormatter: numFmt, type: "numericColumn", width: 130 },
            { headerName: "Plan In-Month", field: "planned_first_cashouts_in_month_cnt", valueFormatter: numFmt, type: "numericColumn", width: 135 },
          ],
          pagination: true,
          paginationPageSize: 100,
          paginationPageSizeSelector: [50, 100, 250, 500],
          animateRows: false,
          suppressMenuHide: true,
        });
      }
    });
  </script>
</body>
</html>
