<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Performance</title>

  <!-- Tabulator for interactive table -->
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_midnight.min.css">
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

  <!-- Papa Parse for CSV -->
  <script src="https://unpkg.com/papaparse@5.5.2/papaparse.min.js"></script>

  <style>
    :root {
      --bg: #0c0e14;
      --surface: #141824;
      --border: #2a3148;
      --text: #e8ecf4;
      --muted: #8b93a8;
      --accent: #7c8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 32px 48px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .subtitle code {
      color: var(--accent);
      background: #1c2130;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .status-bar {
      display: flex;
      gap: 24px;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status-bar .count {
      color: var(--accent);
      font-weight: 600;
    }

    #loading {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabulator overrides for our dark theme */
    .tabulator {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      overflow: hidden;
      font-size: 0.82rem !important;
    }

    .tabulator .tabulator-header {
      background: #1a1f2e !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .tabulator .tabulator-header .tabulator-col {
      background: transparent !important;
      border-right: 1px solid var(--border) !important;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-col-content .tabulator-col-title {
      color: var(--muted) !important;
      font-weight: 600 !important;
      font-size: 0.72rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.04em !important;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-header-filter input {
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 4px !important;
      padding: 4px 8px !important;
      font-size: 0.78rem !important;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-header-filter input::placeholder {
      color: #555d75 !important;
    }

    .tabulator .tabulator-tableholder .tabulator-table .tabulator-row {
      background: transparent !important;
      border-bottom: 1px solid #1c2130 !important;
    }

    .tabulator .tabulator-tableholder .tabulator-table .tabulator-row:hover {
      background: rgba(124, 140, 255, 0.05) !important;
    }

    .tabulator .tabulator-tableholder .tabulator-table .tabulator-row .tabulator-cell {
      color: var(--text) !important;
      border-right: 1px solid #1c2130 !important;
      padding: 8px 12px !important;
    }

    .tabulator .tabulator-footer {
      background: #1a1f2e !important;
      border-top: 1px solid var(--border) !important;
      color: var(--muted) !important;
    }

    .tabulator .tabulator-footer .tabulator-page {
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 4px !important;
      margin: 0 2px !important;
    }

    .tabulator .tabulator-footer .tabulator-page.active {
      background: var(--accent) !important;
      color: var(--bg) !important;
      border-color: var(--accent) !important;
    }

    .tabulator .tabulator-footer .tabulator-page-size {
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 4px !important;
    }
  </style>
</head>
<body>

  <h1>Marketing Performance Overview</h1>
  <div class="subtitle">
    Raw data from <code>rpt_marketing_performance_to_forecast_daily</code> &mdash; sortable, filterable, paginated
  </div>

  <nav style="margin-bottom:24px;display:flex;gap:8px">
    <a href="index.html" style="display:inline-block;padding:8px 18px;background:var(--accent);color:var(--bg);border:1px solid var(--accent);border-radius:6px;text-decoration:none;font-size:0.85rem;font-weight:600">Raw Data</a>
    <a href="summary.html" style="display:inline-block;padding:8px 18px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:6px;text-decoration:none;font-size:0.85rem;font-weight:600">Weekly Summary</a>
  </nav>

  <div class="status-bar" id="status-bar" style="display:none">
    <span><span class="count" id="row-count">0</span> rows loaded</span>
    <span>Date range: <span class="count" id="date-range"></span></span>
    <span>Showing: <span class="count" id="filtered-count">0</span> rows after filters</span>
  </div>

  <div id="loading"><span class="spinner"></span>Loading data&hellip;</div>
  <div id="table"></div>

  <script>
    const CSV_URL = "forecast_performance.csv";

    function fmtDollar(cell) {
      const v = cell.getValue();
      if (v == null || v === "" || isNaN(v)) return "—";
      return "$" + Number(v).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
    }

    function fmtNum(cell) {
      const v = cell.getValue();
      if (v == null || v === "" || isNaN(v)) return "—";
      return Number(v).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
    }

    function fmtDec(cell) {
      const v = cell.getValue();
      if (v == null || v === "" || isNaN(v)) return "—";
      return Number(v).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      dynamicTyping: true,
      skipEmptyLines: true,
      complete: function(results) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("status-bar").style.display = "flex";

        const data = results.data;
        document.getElementById("row-count").textContent = data.length.toLocaleString();

        const dates = data.map(d => d.date_et).filter(Boolean).sort();
        document.getElementById("date-range").textContent = dates[0] + " → " + dates[dates.length - 1];

        const table = new Tabulator("#table", {
          data: data,
          height: "calc(100vh - 200px)",
          layout: "fitDataStretch",
          pagination: true,
          paginationSize: 100,
          paginationSizeSelector: [50, 100, 250, 500],
          movableColumns: true,
          resizableColumns: true,
          initialSort: [{column: "date_et", dir: "desc"}],
          columns: [
            {title: "Date", field: "date_et", headerFilter: "input", width: 120, frozen: true},
            {title: "BU", field: "BU", headerFilter: "input", width: 100},
            {title: "Acq Type", field: "acquisition_type", headerFilter: "input", width: 110},
            {title: "Segment", field: "finance_segment_id", headerFilter: "input", width: 90},
            {title: "Product", field: "finance_product_name", headerFilter: "input", width: 140},
            {title: "Installs", field: "installs_cnt", formatter: fmtDec, hozAlign: "right", sorter: "number", width: 110},
            {title: "Sign-Ups", field: "sign_ups_cnt", formatter: fmtNum, hozAlign: "right", sorter: "number", width: 110},
            {title: "Activations (Y1)", field: "first_cashouts_y1_cnt", formatter: fmtDec, hozAlign: "right", sorter: "number", width: 140},
            {title: "Mature Acts (Y1)", field: "first_cashouts_mature_y1_cnt", formatter: fmtDec, hozAlign: "right", sorter: "number", width: 140},
            {title: "Acts In-Month", field: "first_cashouts_in_month_cnt", formatter: fmtNum, hozAlign: "right", sorter: "number", width: 130},
            {title: "Spend", field: "spend_usd_amt", formatter: fmtDollar, hozAlign: "right", sorter: "number", width: 120},
            {title: "Est. Revenue", field: "estimated_future_revenue_amt", formatter: fmtDollar, hozAlign: "right", sorter: "number", width: 130},
            {title: "Plan Spend", field: "planned_spend_usd_amt", formatter: fmtDollar, hozAlign: "right", sorter: "number", width: 120},
            {title: "Plan Acts (Y1)", field: "planned_first_cashouts_y1_cnt", formatter: fmtDec, hozAlign: "right", sorter: "number", width: 130},
            {title: "Plan In-Month", field: "planned_first_cashouts_in_month_cnt", formatter: fmtDec, hozAlign: "right", sorter: "number", width: 130},
          ],
          dataFiltered: function(filters, rows) {
            document.getElementById("filtered-count").textContent = rows.length.toLocaleString();
          },
        });
      }
    });
  </script>
</body>
</html>
